name: 09 functions

on:
    pull_request:
    workflow_dispatch:

jobs:
    echo1:
        runs-on: ubuntu-latest
        steps:
            - name: failing step
              run: exit 1
            - name: skipped step
              if: ${{success()}}  
              run: echo "This step will be skipped"
            - name: I will run
              if: ${{failure()}}  
              run: echo "This step will run because the previous step failed"
            - name: I will run if not cancelled
              if: ${{!cancelled()}}  
              run: echo "This step will run because the workflow is not cancelled"
            - name: I will run if cancelled
              if: ${{cancelled()}}  
              run: echo "This step will run because the workflow is cancelled"
               